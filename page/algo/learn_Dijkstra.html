<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dijkstra Visualizer - Optimized Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f1f5f9;
    }

    .node {
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .edge {
      transition: all 0.3s ease;
      stroke-dasharray: 4;
      animation: dash 30s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -1000;
      }
    }

    .current-node {
      fill: #ef4444 !important;
      stroke: #b91c1c;
      r: 20;
    }

    .visited-node {
      fill: #10b981 !important;
      stroke: #059669;
    }

    .visited-node-text {
      fill: white !important;
    }

    .path-node {
      fill: #2563eb !important;
      stroke: #1e40af !important;
      r: 18;
    }

    .path-edge {
      stroke: #2563eb !important;
      stroke-width: 4px;
      stroke-dasharray: none;
      opacity: 1 !important;
    }

    .edge-label-bg {
      fill: white;
      fill-opacity: 0.9;
      stroke: #cbd5e1;
      stroke-width: 1px;
      rx: 4;
      ry: 4;
    }

    .log-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px solid #1e293b;
      padding: 4px 4px;
      display: block;
      width: 100%;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 10px;
    }
  </style>
</head>

<body class="p-4">
  <div class="max-w-7xl mx-auto">
    <header class="mb-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Dijkstra Visualizer</h1>
        <p class="text-slate-500 text-sm">Phân bổ đồ thị thông minh trên diện tích lớn</p>
      </div>
      <div class="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
        <div class="flex gap-3">
          <div class="flex flex-col">
            <span class="text-[9px] font-bold text-slate-400 uppercase ml-1">Số thành phố</span>
            <input type="number" id="nodeCountInput" value="12" min="2" max="20"
              class="w-14 px-1 py-0.5 border-b border-slate-100 font-mono font-bold text-emerald-600 outline-none">
          </div>
          <div class="flex flex-col border-l border-slate-100 pl-3">
            <span class="text-[9px] font-bold text-slate-400 uppercase ml-1">Mã bản đồ (Seed)</span>
            <div class="flex items-center">
              <input type="number" id="seedInput" value="1"
                class="w-16 px-1 py-0.5 border-b border-slate-100 font-mono font-bold text-blue-600 outline-none">
              <button id="randomSeedBtn" title="Ngẫu nhiên hóa"
                class="ml-1 p-1 hover:bg-slate-100 rounded transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                  class="text-slate-400 hover:text-blue-500">
                  <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"></path>
                  <path d="m18 2 4 4-4 4"></path>
                  <path d="M2 6h1.9c1.6 0 3.1.9 3.9 2.3l3.5 6"></path>
                  <path d="m18 14 4 4-4 4"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <button id="generateBtn"
          class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold hover:bg-slate-900 transition-all">Tạo
          bản đồ</button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
      <div class="lg:col-span-3 space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
          <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Điều khiển</h2>
          <div class="space-y-3">
            <div class="grid grid-cols-1 gap-2">
              <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Điểm đi</label>
                <select id="startSelect"
                  class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50 outline-none"></select>
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Điểm đến</label>
                <select id="endSelect"
                  class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50 outline-none"></select>
              </div>
            </div>
            <div class="pt-1 flex flex-col gap-2">
              <button id="stepBtn"
                class="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-all">Bước
                tiếp theo</button>
              <button id="runBtn"
                class="w-full py-2 bg-emerald-600 text-white rounded-lg text-sm font-bold hover:bg-emerald-700 transition-all">Chạy
                tự động</button>
              <button id="resetBtn"
                class="w-full py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition-all">Đặt
                lại</button>
            </div>
          </div>
        </div>

        <div class="bg-[#0f172a] rounded-xl shadow-lg overflow-hidden border border-slate-800">
          <div class="p-2 bg-slate-800/80 border-b border-slate-700 flex justify-between items-center">
            <span class="text-[9px] font-bold text-slate-400 uppercase">Nhật ký hoạt động</span>
            <span id="active-seed-display" class="text-[9px] text-blue-400 font-mono">Seed: 1</span>
          </div>
          <div id="log-panel"
            class="p-1 text-[10px] font-mono h-[220px] overflow-y-auto leading-tight overflow-x-hidden text-slate-300">
          </div>
        </div>
      </div>

      <div class="lg:col-span-9 space-y-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden h-[540px]">
          <svg id="svg" class="w-full h-full bg-slate-50">
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
              </marker>
              <marker id="arrowhead-path" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
              </marker>
            </defs>
            <g id="edges-layer"></g>
            <g id="nodes-layer"></g>
          </svg>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div
              class="p-2 bg-amber-50/50 border-b border-amber-100 font-bold text-[9px] text-amber-800 uppercase text-center">
              Hàng đợi ưu tiên</div>
            <div class="max-h-[140px] overflow-y-auto">
              <table class="w-full text-xs text-left">
                <thead class="bg-slate-50 text-[10px] text-slate-400">
                  <tr>
                    <th class="p-2 font-semibold">Đỉnh</th>
                    <th class="p-2 font-semibold text-right">Khoảng cách</th>
                  </tr>
                </thead>
                <tbody id="queueTable"></tbody>
              </table>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div
              class="p-2 bg-blue-50/50 border-b border-blue-100 font-bold text-[9px] text-blue-800 uppercase text-center">
              Bảng khoảng cách</div>
            <div class="max-h-[140px] overflow-y-auto">
              <table class="w-full text-xs text-left">
                <thead class="bg-slate-50 text-[10px] text-slate-400">
                  <tr>
                    <th class="p-2 font-semibold">Đỉnh</th>
                    <th class="p-2 font-semibold text-center">Đi từ</th>
                    <th class="p-2 font-semibold text-right">Tổng (D)</th>
                  </tr>
                </thead>
                <tbody id="distanceTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    class SeededRandom {
      constructor(seed) { this.seed = seed; }
      next() {
        this.seed = (this.seed * 1664525 + 1013904223) % 4294967296;
        return this.seed / 4294967296;
      }
      nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
    }

    const CITY_NAMES = "ABCDEFGHIJKLMNOPQRST".split("");
    let nodes = [], edges = [], adj = {}, startNodeId = 0, endNodeId = 0;
    let distances = {}, previous = {}, visited = new Set(), unvisited = [];
    let isDone = false, isAutoRunning = false, rng = new SeededRandom(1);

    function initGraph() {
      const seedVal = parseInt(document.getElementById('seedInput').value) || 1;
      const numNodes = Math.min(20, Math.max(2, parseInt(document.getElementById('nodeCountInput').value) || 12));

      rng = new SeededRandom(seedVal);
      document.getElementById('active-seed-display').textContent = `Seed: ${seedVal}`;

      const svg = document.getElementById('svg');
      const width = svg.clientWidth || 800;
      const height = svg.clientHeight || 540;
      const padding = 50;

      nodes = []; edges = []; adj = {};

      // THUẬT TOÁN PHÂN BỔ GRID ĐỂ PHỦ KÍN KHÔNG GIAN
      const cols = Math.ceil(Math.sqrt(numNodes * (width / height)));
      const rows = Math.ceil(numNodes / cols);
      const cellW = (width - 2 * padding) / cols;
      const cellH = (height - 2 * padding) / rows;

      let cellIndices = [];
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) cellIndices.push({ r, c });
      // Shuffle cells using seed
      for (let i = cellIndices.length - 1; i > 0; i--) {
        const j = Math.floor(rng.next() * (i + 1));
        [cellIndices[i], cellIndices[j]] = [cellIndices[j], cellIndices[i]];
      }

      for (let i = 0; i < numNodes; i++) {
        const cell = cellIndices[i];
        // Tính toán vị trí tâm cell kèm theo độ lệch ngẫu nhiên (jitter) để không quá cứng nhắc
        const jitterX = (rng.next() - 0.5) * (cellW * 0.6);
        const jitterY = (rng.next() - 0.5) * (cellH * 0.6);

        const x = padding + (cell.c + 0.5) * cellW + jitterX;
        const y = padding + (cell.r + 0.5) * cellH + jitterY;

        nodes.push({ id: i, name: CITY_NAMES[i], x, y });
        adj[i] = [];
      }

      // Nối các đỉnh kề gần nhất để tạo đồ thị có tính kết nối cao
      nodes.forEach(u => {
        const neighbors = [...nodes]
          .filter(v => v.id !== u.id)
          .sort((a, b) => Math.hypot(u.x - a.x, u.y - a.y) - Math.hypot(u.x - b.x, u.y - b.y));

        // Mỗi node nối với 2-3 node gần nhất
        neighbors.slice(0, rng.nextInt(2, 3)).forEach(v => {
          const cost = rng.nextInt(5, 50);
          edges.push({ from: u.id, to: v.id, cost });
          adj[u.id].push({ to: v.id, cost });
        });
      });

      renderGraph();
      updateSelectors(numNodes);
      resetAlgo();
    }

    function renderGraph() {
      const nl = document.getElementById('nodes-layer');
      const el = document.getElementById('edges-layer');
      nl.innerHTML = ''; el.innerHTML = '';

      edges.forEach((edge) => {
        const from = nodes[edge.from], to = nodes[edge.to];
        const dx = to.x - from.x, dy = to.y - from.y, dist = Math.hypot(dx, dy);
        const ux = dx / dist, uy = dy / dist;
        const startX = from.x + ux * 18, startY = from.y + uy * 18;
        const endX = to.x - ux * 23, endY = to.y - uy * 23;

        // Vẽ đường cong nhẹ để tránh các đường thẳng trùng nhau
        const bend = 15;
        const midX = (startX + endX) / 2 + (-uy * bend), midY = (startY + endY) / 2 + (ux * bend);

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M${startX},${startY} Q${midX},${midY} ${endX},${endY}`);
        path.setAttribute("class", "edge stroke-slate-300 fill-none opacity-30");
        path.setAttribute("stroke-width", "1.5");
        path.setAttribute("marker-end", "url(#arrowhead)");
        path.id = `edge-${edge.from}-${edge.to}`;
        el.appendChild(path);

        const t = 0.5;
        const lx = (1 - t) * (1 - t) * startX + 2 * (1 - t) * t * midX + t * t * endX;
        const ly = (1 - t) * (1 - t) * startY + 2 * (1 - t) * t * midY + t * t * endY;
        const labelG = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        bg.setAttribute("x", lx - 9); bg.setAttribute("y", ly - 7);
        bg.setAttribute("width", "18"); bg.setAttribute("height", "14");
        bg.setAttribute("class", "edge-label-bg");
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", lx); text.setAttribute("y", ly + 3.5);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("class", "text-[9px] font-bold fill-slate-600");
        text.textContent = edge.cost;
        labelG.appendChild(bg); labelG.appendChild(text); el.appendChild(labelG);
      });

      nodes.forEach(node => {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "node");
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", node.x); circle.setAttribute("cy", node.y); circle.setAttribute("r", "15");
        circle.setAttribute("fill", "white"); circle.setAttribute("stroke", "#cbd5e1");
        circle.setAttribute("stroke-width", "2"); circle.id = `node-circle-${node.id}`;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", node.x); text.setAttribute("y", node.y + 4);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("class", "text-[10px] font-bold fill-slate-800");
        text.id = `node-text-${node.id}`; text.textContent = node.name;
        g.appendChild(circle); g.appendChild(text); nl.appendChild(g);
      });
    }

    function resetAlgo() {
      isDone = false; visited.clear(); distances = {}; previous = {}; unvisited = [];
      document.getElementById('log-panel').innerHTML = '';
      nodes.forEach(n => {
        distances[n.id] = Infinity; previous[n.id] = null; unvisited.push(n.id);
        const c = document.getElementById(`node-circle-${n.id}`);
        const t = document.getElementById(`node-text-${n.id}`);
        if (c) { c.className.baseVal = "node"; c.setAttribute('fill', 'white'); c.setAttribute('r', '15'); }
        if (t) t.className.baseVal = "text-[10px] font-bold fill-slate-800";
      });
      edges.forEach(e => {
        const el = document.getElementById(`edge-${e.from}-${e.to}`);
        if (el) { el.classList.remove('path-edge'); el.classList.add('opacity-30'); el.setAttribute("marker-end", "url(#arrowhead)"); }
      });
      distances[startNodeId] = 0;
      log(`📍 BẮT ĐẦU: ${CITY_NAMES[startNodeId]} ➔ ${CITY_NAMES[endNodeId]}`, 'init');
      updateTables();
    }

    function step() {
      if (isDone) return;
      let avail = unvisited.filter(id => !visited.has(id));
      if (avail.length === 0) { isDone = true; return; }
      avail.sort((a, b) => distances[a] - distances[b]);
      const u = avail[0];

      if (distances[u] === Infinity) {
        isDone = true;
        log(`❌ Dừng: Không còn đường đi khả thi.`, 'error');
        return;
      }

      const cur = document.getElementById(`node-circle-${u}`);
      nodes.forEach(n => document.getElementById(`node-circle-${n.id}`).classList.remove('current-node'));
      cur.classList.add('current-node');
      log(`🔍 Xét ${CITY_NAMES[u]} (D=${distances[u]})`, 'process');

      adj[u].forEach(edge => {
        const v = edge.to;
        const weight = edge.cost;
        const newDist = distances[u] + weight;

        if (visited.has(v)) {
          log(`   - ${CITY_NAMES[v]}: Đã xét xong (Bỏ qua)`, 'muted');
        } else {
          if (newDist < distances[v]) {
            log(`   + ${CITY_NAMES[v]}: ${distances[v]} -> ${newDist} (Cập nhật)`, 'success');
            distances[v] = newDist;
            previous[v] = u;
          } else {
            log(`   - ${CITY_NAMES[v]}: ${newDist} >= ${distances[v]} (Lớn hơn - Bỏ qua)`, 'muted');
          }
        }
      });

      visited.add(u);
      setTimeout(() => {
        cur.classList.remove('current-node'); cur.classList.add('visited-node');
        document.getElementById(`node-text-${u}`).classList.add('visited-node-text');
        if (u === endNodeId) {
          isDone = true;
          highlightPath();
          log(`🏆 Đã tìm thấy: ${distances[u]}`, 'finish');
        }
        updateTables();
      }, 200);
      updateTables();
    }

    async function runAuto() {
      if (isAutoRunning || isDone) return;
      isAutoRunning = true;
      const ids = ['runBtn', 'stepBtn', 'generateBtn', 'randomSeedBtn'];
      ids.forEach(id => document.getElementById(id).disabled = true);
      while (!isDone && visited.size < nodes.length) { step(); await new Promise(r => setTimeout(r, 600)); }
      isAutoRunning = false;
      ids.forEach(id => document.getElementById(id).disabled = false);
    }

    function highlightPath() {
      let c = endNodeId;
      while (previous[c] !== null) {
        const p = previous[c];
        const el = document.getElementById(`edge-${p}-${c}`);
        if (el) { el.classList.add('path-edge'); el.classList.remove('opacity-30'); el.setAttribute("marker-end", "url(#arrowhead-path)"); }
        document.getElementById(`node-circle-${c}`).classList.add('path-node');
        c = p;
      }
      document.getElementById(`node-circle-${startNodeId}`).classList.add('path-node');
    }

    function updateTables() {
      const q = document.getElementById('queueTable');
      const qData = unvisited.filter(id => !visited.has(id) && distances[id] !== Infinity).sort((a, b) => distances[a] - distances[b]);
      q.innerHTML = qData.map(id => `
        <tr class="border-b hover:bg-amber-50">
          <td class="p-2 font-bold">${CITY_NAMES[id]}</td>
          <td class="p-2 text-right font-mono text-amber-600">${distances[id]}</td>
        </tr>`).join('');

      document.getElementById('distanceTable').innerHTML = nodes.map(n => {
        const parentId = previous[n.id];
        const parentName = parentId !== null ? CITY_NAMES[parentId] : "-";
        return `
          <tr class="border-b hover:bg-blue-50">
            <td class="p-2 font-bold">${n.name}</td>
            <td class="p-2 text-center font-mono text-slate-400">${parentName}</td>
            <td class="p-2 text-right font-mono ${distances[n.id] === Infinity ? 'text-slate-300' : 'text-blue-600 font-bold'}">
              ${distances[n.id] === Infinity ? '∞' : distances[n.id]}
            </td>
          </tr>`;
      }).join('');
    }

    function updateSelectors(numNodes) {
      const s = document.getElementById('startSelect'), e = document.getElementById('endSelect');
      const opts = nodes.map(n => `<option value="${n.id}">${n.name}</option>`).join('');
      s.innerHTML = opts; e.innerHTML = opts;
      s.value = 0; e.value = numNodes - 1;
      startNodeId = 0; endNodeId = numNodes - 1;
    }

    function log(m, type) {
      const p = document.getElementById('log-panel');
      const d = document.createElement('div');
      d.className = "log-line";
      let style = "text-slate-400";
      switch (type) {
        case 'init': style = "text-blue-400 font-bold"; break;
        case 'process': style = "text-white font-bold bg-slate-800"; break;
        case 'success': style = "text-emerald-400 ml-2"; break;
        case 'muted': style = "text-slate-500 ml-2 italic"; break;
        case 'error': style = "text-red-400"; break;
        case 'finish': style = "text-yellow-400 font-bold"; break;
      }
      d.innerHTML = `<span class="${style}">${m}</span>`;
      p.appendChild(d); p.scrollTop = p.scrollHeight;
    }

    document.getElementById('generateBtn').onclick = initGraph;
    document.getElementById('randomSeedBtn').onclick = () => {
      document.getElementById('seedInput').value = Math.floor(Math.random() * 9999);
      initGraph();
    };
    document.getElementById('resetBtn').onclick = resetAlgo;
    document.getElementById('stepBtn').onclick = step;
    document.getElementById('runBtn').onclick = runAuto;
    document.getElementById('startSelect').onchange = (e) => { startNodeId = parseInt(e.target.value); resetAlgo(); };
    document.getElementById('endSelect').onchange = (e) => { endNodeId = parseInt(e.target.value); resetAlgo(); };

    window.onload = () => setTimeout(initGraph, 100);
  </script>
</body>

</html>
