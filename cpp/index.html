<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAYMOND | C++ Knowledge Base</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    
    /* Custom scrollbar for sidebar */
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* Fix iframe height */
    #content-frame {
      width: 100%;
      height: calc(100vh - 64px); /* Trừ đi chiều cao của navbar */
      border: none;
    }

    .hidden-header #page-header {
      display: none;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

  <!-- Top Banner / Navbar -->
  <nav class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between z-30 shadow-sm shrink-0">
    <div class="flex items-center gap-3">
      <div class="bg-blue-600 p-2 rounded-lg text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
      </div>
      <span class="text-xl font-black tracking-tighter text-slate-800">RAYMOND</span>
    </div>
    
    <div class="hidden md:flex gap-6 text-sm font-medium text-slate-600">
      <a href="#" class="hover:text-blue-600 transition">Học tập</a>
      <a href="#" class="hover:text-blue-600 transition">Dự án</a>
      <a href="#" class="hover:text-blue-600 transition">Liên hệ</a>
    </div>

    <button class="md:hidden p-2 text-slate-600" onclick="toggleSidebar()">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
      </svg>
    </button>
  </nav>

  <div class="flex flex-1 overflow-hidden">
    
    <!-- Sidebar / Mục lục -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-20 w-72 bg-white border-r border-slate-200 transform -translate-x-full md:translate-x-0 md:static md:inset-0 transition-transform duration-300 ease-in-out flex flex-col shrink-0">
      <div class="p-6 border-b border-slate-100">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Danh mục kiến thức</h2>
      </div>
      
      <nav class="flex-1 overflow-y-auto sidebar-scroll p-4 space-y-4">
        
        <!-- Nhóm Pointer -->
        <div class="space-y-1">
          <button onclick="toggleFolder('pointer-list')" class="w-full flex items-center justify-between p-2 text-slate-700 font-semibold hover:bg-slate-50 rounded-md transition">
            <span class="flex items-center"><span class="mr-2">📌</span> Pointer</span>
            <svg id="icon-pointer-list" class="w-4 h-4 transition-transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
          </button>
          <div id="pointer-list" class="pl-6 space-y-1">
            <button onclick="loadExternalContent('https://raymondtruongdev.github.io/raymond_doc/cpp/pointer/pointer_01.html', 'Pointer Basics')" class="w-full text-left p-2 text-sm text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition">Pointer Basics</button>
            <button onclick="loadPage('Dangling Pointer', 'Con trỏ lơ lửng...')" class="w-full text-left p-2 text-sm text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition">Dangling Pointer</button>
          </div>
        </div>

        <!-- Nhóm Array -->
        <div class="space-y-1">
          <button onclick="toggleFolder('array-list')" class="w-full flex items-center justify-between p-2 text-slate-700 font-semibold hover:bg-slate-50 rounded-md transition">
            <span class="flex items-center"><span class="mr-2">📦</span> Array</span>
            <svg id="icon-array-list" class="w-4 h-4 transition-transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
          </button>
          <div id="array-list" class="pl-6 space-y-1">
            <button onclick="loadPage('Array Basics', 'Khai báo mảng...')" class="w-full text-left p-2 text-sm text-slate-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition">Array 1 - Basics</button>
          </div>
        </div>

      </nav>

      <div class="p-4 border-t border-slate-100 text-[10px] text-slate-400 text-center">
        © 2026 RAYMOND KNOWLEDGE BASE
      </div>
    </aside>

    <!-- Content Area -->
    <main id="content-container" class="flex-1 overflow-y-auto bg-white relative">
      <div id="overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-slate-900/40 z-10 md:hidden"></div>

      <!-- Welcome Header -->
      <header id="page-header" class="bg-slate-900 text-white py-20 px-8 transition-all duration-300">
        <div class="max-w-4xl mx-auto text-center">
          <h1 class="text-4xl md:text-6xl font-bold mb-6">📚 C++ Knowledge Base</h1>
          <p class="text-slate-400 text-xl max-w-2xl mx-auto leading-relaxed">
            Hệ thống ghi chép cá nhân về ngôn ngữ lập trình C++. Chọn một chủ đề bên trái để bắt đầu học tập.
          </p>
        </div>
      </header>

      <!-- Main Content Slot -->
      <div id="main-content" class="w-full h-full">
         <!-- Mặc định khi chưa chọn gì -->
         <div id="placeholder-ui" class="flex flex-col items-center justify-center py-20 text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <p class="text-xl italic">Vui lòng chọn bài học từ danh mục bên trái.</p>
          </div>
      </div>
    </main>
  </div>

  <script>
    function toggleFolder(id) {
      const el = document.getElementById(id);
      const icon = document.getElementById('icon-' + id);
      el.classList.toggle('hidden');
      icon.classList.toggle('rotate-180');
    }

    // Hàm nhúng nội dung từ URL bên ngoài
    function loadExternalContent(url, title) {
      const container = document.getElementById('main-content');
      const header = document.getElementById('page-header');
      
      // Ẩn Header chào mừng để nhường chỗ cho iframe toàn màn hình
      header.classList.add('hidden');
      document.getElementById('placeholder-ui').classList.add('hidden');

      // Nhúng iframe
      container.innerHTML = `
        <div class="w-full h-full animate-fadeIn">
          <div class="bg-slate-100 px-6 py-2 border-b flex justify-between items-center text-xs text-slate-500">
            <span>Đang xem: <strong>${title}</strong></span>
            <a href="${url}" target="_blank" class="text-blue-600 hover:underline">Mở trong tab mới ↗</a>
          </div>
          <iframe id="content-frame" src="${url}" class="w-full h-full"></iframe>
        </div>
      `;

      if (window.innerWidth < 768) toggleSidebar();
    }

    // Hàm load placeholder cho các bài chưa có link
    function loadPage(title, description) {
      const header = document.getElementById('page-header');
      const container = document.getElementById('main-content');
      
      header.classList.remove('hidden');
      document.getElementById('placeholder-ui').classList.add('hidden');
      
      container.innerHTML = `
        <div class="animate-fadeIn max-w-4xl mx-auto px-8 py-12">
          <h2 class="text-3xl font-bold mb-4">${title}</h2>
          <p class="text-slate-600 mb-8">${description}</p>
          <div class="p-10 border-2 border-dashed border-slate-200 rounded-xl text-center text-slate-400">
            Nội dung này hiện chưa được liên kết với trang GitHub Pages.
          </div>
        </div>
      `;
      if (window.innerWidth < 768) toggleSidebar();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-in forwards;
    }
    .hidden { display: none !important; }
  </style>
</body>
</html>
