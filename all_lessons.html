<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raymond's Contents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    html {
      font-size: clamp(15px, 0.9vw, 18px);
    }

    body {
      font-family: "Inter", sans-serif;
      scroll-behavior: smooth;
    }

    .cat-content {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s ease-out, opacity 0.35s;
      opacity: 0;
    }

    .cat-content.open {
      grid-template-rows: 1fr;
      opacity: 1;
      padding-bottom: 1.5rem;
    }

    .lesson-item {
      transition: all 0.25s ease;
    }

    .lesson-item:hover {
      transform: translateY(-3px);
    }

    ::-webkit-scrollbar {
      width: 7px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    .toggle-dot {
      transition: all 0.3s ease-in-out;
    }

    input:checked~.toggle-dot {
      transform: translateX(100%);
      background-color: #2563eb;
    }

    input:checked~.toggle-bg {
      background-color: #dbeafe;
      border-color: #bfdbfe;
    }

    .color-theme-bg {
      background: linear-gradient(to right, #1e3a8a, #1d4ed8);
    }

    .glass-card {
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col text-slate-800">
  <!-- HEADER -->
  <header class="color-theme-bg border-b border-blue-800 sticky top-0 z-20 shadow-lg">
    <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col lg:flex-row justify-between items-center gap-5">
      <div>
        <h1 class="text-2xl md:text-3xl font-black flex items-center gap-3 text-white tracking-tight">
          <i data-lucide="library" class="text-blue-200 w-8 h-8"></i>
          RAYMOND's Library
        </h1>
        <p class="text-sm text-blue-100 uppercase tracking-[0.2em] font-semibold mt-1">
          GitHub Pages Learning Materials
        </p>
      </div>
      <div class="relative w-full lg:w-96">
        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-blue-300"></i>
        <input type="text" id="searchInput" placeholder="Tìm kiếm bài học..."
          class="w-full pl-12 pr-5 py-3.5 bg-blue-700/80 border border-blue-500 rounded-2xl outline-none focus:ring-4 focus:ring-blue-300/30 transition-all text-base text-white placeholder:text-blue-200 shadow-inner" />
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl w-full mx-auto px-6 mt-10 flex-grow pb-16">
    <!-- ACTIONS -->
    <div class="mb-10 flex flex-wrap items-center justify-between gap-5">
      <div class="flex flex-wrap gap-3">
        <a href="index.html"
          class="px-5 py-3 bg-blue-600 text-white rounded-2xl text-sm font-bold hover:bg-blue-700 transition flex items-center gap-2 shadow-md hover:shadow-lg">
          <i data-lucide="home" class="w-4 h-4"></i> TRANG CHỦ
        </a>
        <button onclick="toggleAll(true)"
          class="px-5 py-3 bg-white border border-slate-200 text-slate-700 rounded-2xl text-sm font-bold hover:bg-slate-50 transition flex items-center gap-2 shadow-sm">
          <i data-lucide="folder-open" class="w-4 h-4"></i> MỞ TẤT CẢ
        </button>
        <button onclick="toggleAll(false)"
          class="px-5 py-3 bg-white border border-slate-200 text-slate-700 rounded-2xl text-sm font-bold hover:bg-slate-50 transition flex items-center gap-2 shadow-sm">
          <i data-lucide="folder-closed" class="w-4 h-4"></i> THU GỌN
        </button>
      </div>
      <!-- TAB OPTION -->
      <div class="flex items-center gap-4 bg-white border border-slate-200 px-5 py-3 rounded-2xl shadow-sm">
        <span class="text-sm font-bold text-slate-600 uppercase tracking-wide">Mở tab mới</span>
        <label for="tabToggle" class="flex items-center cursor-pointer relative">
          <input type="checkbox" id="tabToggle" class="sr-only" onchange="updateTabPreference(this.checked)" checked />
          <div class="toggle-bg block w-12 h-7 bg-slate-100 border border-slate-200 rounded-full transition-colors">
          </div>
          <div class="toggle-dot absolute left-1 top-1 bg-slate-400 w-5 h-5 rounded-full"></div>
        </label>
      </div>
    </div>

    <!-- APP -->
    <div id="app" class="space-y-6"></div>

    <!-- EMPTY -->
    <div id="empty" class="hidden text-center py-24">
      <i data-lucide="search-x" class="w-16 h-16 mx-auto text-slate-300 mb-5"></i>
      <h3 class="text-2xl font-bold text-slate-800">Không tìm thấy bài học</h3>
      <p class="text-slate-500 text-base mt-2">Vui lòng thử từ khóa khác</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer
    class="color-theme-bg p-8 border-t border-blue-700 text-xs text-blue-100 text-center uppercase tracking-[0.3em] font-bold">
    © 2026 Raymond. All rights reserved.
  </footer>

  <script>
    let openInNewTab = true;
    const DATA = [
      {
        id: "algo",
        title: "ALGORITHM LESSONS",
        icon: "cpu",
        dotColor: "bg-purple-500",
        lessons: [
          { name: "Breadth First Search (BFS)", file: "learn_bfs.html", path: "./page/algo/01_learn_bfs.html" },
          { name: "Dijkstra Algorithm", file: "learn_Dijkstra.html", path: "./page/algo/02_learn_Dijkstra.html" },
          { name: "A* Algorithm", file: "learn_Astar.html", path: "./page/algo/03_learn_Astar.html" },
        ],
      },
      {
        id: "html",
        title: "HTML LESSONS",
        icon: "layout",
        dotColor: "bg-blue-500",
        lessons: [
          { name: "01. Semantic Container", file: "01_semantic_container.html", path: "./page/learn_html/01_semantic_container.html" },
          { name: "02. Flexbox Layout", file: "02_flex_layout.html", path: "./page/learn_html/02_flex_layout.html" },
          { name: "03. CSS Grid Layout", file: "03_grid_layout.html", path: "./page/learn_html/03_grid_layout.html" },
        ],
      },

      {
        id: "git",
        title: "Git Lessons",
        icon: "git-branch",
        dotColor: "bg-emerald-500",
        lessons: [
          { name: "01. Git Push Instructions", file: "01_git_push.html", path: "./page/git_lesson/01_git_push.html" },
        ],
      },
      {
        id: "C++ LESSONS",
        title: "C++ Lessons",
        icon: "code",
        dotColor: "bg-blue-500",
        lessons: [
          { name: "01. Introduction Pointer", file: "01_introduction.html", path: "./page/cpp_lesson/01_basics_pointer.html" },
          { name: "02. C++ Shared & Weak Pointers", file: "02_C++ Shared & Weak Pointers.html", path: "./page/cpp_lesson/02_C++ Shared & Weak Pointers.html" },
        ],
      },
    ];

    const app = document.getElementById("app");
    const empty = document.getElementById("empty");
    const search = document.getElementById("searchInput");

    function updateTabPreference(checked) {
      openInNewTab = checked;
      render();
    }

    function render() {
      const target = openInNewTab ? "_blank" : "_self";
      app.innerHTML = DATA.map((cat) => `
        <section class="cat-card bg-white rounded-3xl shadow-md border border-slate-200 overflow-hidden transition-all" data-id="${cat.id}">
          <button onclick="toggleCategory('${cat.id}')" class="w-full flex items-center justify-between p-7 hover:bg-slate-50 transition">
            <div class="flex items-center gap-5 text-left">
              <div class="p-4 bg-slate-100 rounded-2xl text-blue-600">
                <i data-lucide="${cat.icon}" class="w-7 h-7"></i>
              </div>
              <div>
                <h2 class="text-xl md:text-2xl font-bold text-slate-900">${cat.title}</h2>
                <p class="text-sm text-orange-400 uppercase font-bold tracking-[0.18em] mt-1" id="count-${cat.id}">
                  ${cat.lessons.length} Bài học
                </p>
              </div>
            </div>
            <i data-lucide="chevron-down" class="chevron w-6 h-6 text-slate-300 transition-transform duration-300"></i>
          </button>
          <div id="content-${cat.id}" class="cat-content open">
            <div class="overflow-hidden px-6 flex flex-col gap-3">
              ${cat.lessons.map((ls) => `
                <a href="${ls.path}" target="${target}" onclick="handleLinkClick(event, '${ls.path}')" class="lesson-item flex items-center justify-between p-5 bg-white border border-slate-200 rounded-2xl hover:bg-blue-50 hover:border-blue-200 group cursor-pointer shadow-sm hover:shadow-md">
                  <div class="flex items-center gap-4">
                    <span class="${cat.dotColor} w-3 h-3 rounded-full transition-transform group-hover:scale-150"></span>
                    <span class="text-base md:text-lg font-semibold text-slate-700 group-hover:text-blue-700">${ls.name}</span>
                  </div>
                  <span class="text-xs md:text-sm font-mono text-slate-400 hidden md:block">${ls.file}</span>
                </a>
              `).join("")}
            </div>
          </div>
        </section>
      `).join("");
      lucide.createIcons();
    }

    function handleLinkClick(event, path) {
      event.preventDefault();
      if (openInNewTab) {
        window.open(path, "_blank");
      } else {
        window.location.href = path;
      }
    }

    function toggleCategory(id) {
      const content = document.getElementById(`content-${id}`);
      const card = content.closest(".cat-card");
      const chevron = card.querySelector(".chevron");
      content.classList.toggle("open");
      chevron.style.transform = content.classList.contains("open") ? "rotate(180deg)" : "rotate(0deg)";
    }

    function toggleAll(open) {
      document.querySelectorAll(".cat-content").forEach((c) => {
        open ? c.classList.add("open") : c.classList.remove("open");
        const chevron = c.closest(".cat-card").querySelector(".chevron");
        chevron.style.transform = open ? "rotate(180deg)" : "rotate(0deg)";
      });
    }

    search.addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();
      let totalFound = 0;
      document.querySelectorAll(".cat-card").forEach((card) => {
        const id = card.dataset.id;
        const lessons = card.querySelectorAll(".lesson-item");
        let foundInCat = 0;
        lessons.forEach((ls) => {
          const match = ls.textContent.toLowerCase().includes(term);
          ls.classList.toggle("hidden", !match);
          if (match) foundInCat++;
        });
        card.classList.toggle("hidden", foundInCat === 0);
        document.getElementById(`count-${id}`).textContent = `${foundInCat} Bài học`;
        if (foundInCat > 0 && term !== "") {
          document.getElementById(`content-${id}`).classList.add("open");
          card.querySelector(".chevron").style.transform = "rotate(180deg)";
        }
        totalFound += foundInCat;
      });
      empty.classList.toggle("hidden", totalFound > 0 || term === "");
    });

    window.onload = render;
  </script>
</body>

</html>
